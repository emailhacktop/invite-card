<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>دعوتنامه اختصاصی</title>

<style>

/* =========================
   فونت ها
========================= */

@font-face{

font-family:'Vazirmatn';

src:url('Vazirmatn-Regular.woff2');

}

@font-face{

font-family:'IranNastaliq';

src:url('IranNastaliq.ttf');

}

/* =========================
   تنظیمات اصلی
========================= */

*{

box-sizing:border-box;

margin:0;

padding:0;

}

html,
body{

width:100%;

height:100%;

overflow-x:hidden;

font-family:'Vazirmatn',Tahoma,sans-serif;

background:
radial-gradient(
circle at top,
#3b2a00,
#000000 60%
);

color:white;

text-align:center;

}

/* =========================
   قاب طلایی
========================= */

body::before{

content:"";

position:fixed;

top:10px;
left:10px;
right:10px;
bottom:10px;

border:3px solid #D4AF37;

border-radius:25px;

pointer-events:none;

box-shadow:

0 0 10px #D4AF37,

0 0 30px rgba(
212,
175,
55,
0.5
);

z-index:999;

}

/* =========================
   صفحه ورود
========================= */

#intro{

position:fixed;

inset:0;

background:black;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:5000;

}

.introTitle{

font-size:34px;

color:#D4AF37;

margin-bottom:20px;

}

.introSub{

font-size:20px;

color:white;

}

/* =========================
   ذرات طلایی
========================= */

.particles{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;

overflow:hidden;

}

.particles span{

position:absolute;

width:5px;

height:5px;

background:#FFD700;

border-radius:50%;

box-shadow:

0 0 10px #FFD700,

0 0 20px #FFD700;

animation:floatUp linear infinite;

}

@keyframes floatUp{

from{

transform:
translateY(100vh);

opacity:0;

}

20%{

opacity:1;

}

to{

transform:
translateY(-20vh);

opacity:0;

}

}

/* =========================
   نام مهمان
========================= */

.name{

margin-top:70px;

min-height:80px;

font-family:'IranNastaliq';

font-size:52px;

color:#FFD700;

text-shadow:

0 0 10px #FFD700,

0 0 20px #FFD700,

0 0 40px rgba(
255,
215,
0,
0.8
);

}

/* =========================
   متن دعوت
========================= */

.sub{

margin-top:20px;

font-size:18px;

line-height:2;

padding:0 20px;

opacity:0;

animation:
showSub 2s 3s forwards;

}

@keyframes showSub{

to{

opacity:1;

}

}

/* =========================
   ویدیو
========================= */

video{

width:95%;

max-width:700px;

margin-top:30px;

border-radius:20px;

opacity:0;

animation:
showVideo 2s 5s forwards;

box-shadow:

0 0 20px rgba(
255,
215,
0,
0.2
),

0 0 50px rgba(
255,
215,
0,
0.3
);

}

@keyframes showVideo{

to{

opacity:1;

}

}

/* =========================
   لوگو مدیریت
========================= */

.signature{

position:fixed;

bottom:10px;

right:15px;

font-size:11px;

color:rgba(
255,
255,
255,
0.20
);

cursor:pointer;

user-select:none;

z-index:9999;

}

</style>

</head>

<body>

<!-- صفحه خوش آمد -->

<div id="intro">

<div class="introTitle">

به نام ایزد مهرآفرین

</div>

<div class="introSub">

دعوتنامه اختصاصی

</div>

</div>

<!-- ذرات -->

<div
class="particles"
id="particles">
</div>

<!-- نام مهمان -->

<div
class="name"
id="guestName">
</div>

<!-- متن -->

<div class="sub">

با نهایت احترام

حضور گرم شما را در این مراسم

ارج می‌نهیم و مشتاق دیدار شما هستیم.

</div>

<!-- ویدیو -->

<video
id="video"
controls>

<source
src="Kart_davat.mp4"
type="video/mp4">

</video>

<!-- لوگوی مدیریت -->

<div
class="signature"
id="adminLogo">

AminSystem2000

</div>

<!-- فایل مهمانان -->

<script src="guests.js"></script>

<script>
/* =========================
   رمز مدیریت
========================= */

const ADMIN_HASH =
"QW1pbjIwMDA=";

/* =========================
   دریافت پارامترها
========================= */

const params =
new URLSearchParams(
window.location.search
);

const guestId =
params.get("id");

const guestToken =
params.get("token");

/* =========================
   بررسی فایل مهمانان
========================= */

if(
typeof guests === "undefined"
){

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
">

خطا در بارگذاری guests.js

</div>

`;

throw new Error(
"guests.js not loaded"
);

}

/* =========================
   بررسی وجود مهمان
========================= */

if(
!guestId ||
!guests[guestId]
){

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:24px;
">

با عرض پوزش

<br><br>

در لیست میهمانان نبوده اید

</div>

`;

throw new Error(
"Guest Not Found"
);

}

/* =========================
   بررسی توکن
========================= */

if(
guests[guestId].token
!== guestToken
){

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
">

دسترسی غیرمجاز

</div>

`;

throw new Error(
"Invalid Token"
);

}

/* =========================
   اطلاعات مهمان
========================= */

const guestNameValue =
guests[guestId].name;

/* =========================
   محدودیت بازدید
========================= */

const viewKey =
"views_" + guestId;

let views =
parseInt(
localStorage.getItem(
viewKey
) || "0"
);

let expired = false;

if(
views >= 10
){

expired = true;

document.body.insertAdjacentHTML(

"beforeend",

`

<div id="expiredMessage"

style="
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
z-index:3000;
">

<div style="
font-size:28px;
color:#FFD700;
">

لینک منقضی شده است

</div>

<div style="
margin-top:15px;
font-size:14px;
color:#cccccc;
">

جهت مدیریت روی لوگو
  کلیک کنید

</div>

</div>

`

);

}
else{

localStorage.setItem(
viewKey,
views + 1
);

}

/* =========================
   افکت تایپ نام مهمان
========================= */

let text =
"خدمت "
+ guestNameValue;

let index = 0;

function typeWriter(){

if(
index < text.length
){

document
.getElementById(
"guestName"
)
.textContent +=
text.charAt(index);

index++;

setTimeout(
typeWriter,
80
);

}

}

/* =========================
   ساخت ذرات طلایی
========================= */

function createParticles(){

const container =
document.getElementById(
"particles"
);

container.innerHTML = "";

for(
let i=0;
i<50;
i++
){

const span =
document.createElement(
"span"
);

span.style.left =
Math.random()*100
+ "vw";

span.style.animationDuration =
(5 + Math.random()*7)
+ "s";

span.style.opacity =
Math.random();

container.appendChild(
span
);

}

}

/* =========================
   بررسی ویدیو
========================= */

const video =
document.getElementById(
"video"
);

video.addEventListener(

"error",

()=>{

video.insertAdjacentHTML(

"afterend",

`

<div style="
margin-top:15px;
color:#FFD700;
">

فایل Kart_davat.mp4 یافت نشد

</div>

`

);

}

);

/* =========================
   پنل مدیریت
========================= */

let tapCount = 0;

document
.getElementById(
"adminLogo"
)
.addEventListener(

"click",

()=>{

tapCount++;

if(
tapCount >= 10
){

const pass =
prompt(
"رمز مدیریت"
);

if(

btoa(pass || "")
=== ADMIN_HASH

){

localStorage.removeItem(
viewKey
);

alert(
"شمارنده بازدید ریست شد"
);

location.reload();

}
else{

alert(
"رمز اشتباه است"
);

}

tapCount = 0;

}

}

);

/* =========================
   شروع برنامه
========================= */

window.onload = ()=>{

createParticles();

/* صفحه خوش آمد */

setTimeout(()=>{

const intro =
document.getElementById(
"intro"
);

if(intro){

intro.style.opacity="0";

setTimeout(()=>{

intro.remove();

},1000);

}

},3000);

if(
!expired
){

setTimeout(
typeWriter,
3500
);

setTimeout(()=>{

video
.play()
.catch(()=>{});

},6000);

}

};

</script>

</body>

</html>
