<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کارت دعوت</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color:white;
    font-family:tahoma;
    text-align:center;
    overflow:hidden;
}

.container{
    position:relative;
    top:40px;
}

.name{
    font-size:38px;
    font-weight:bold;
    color:#ffd700;
    margin-bottom:20px;
    opacity:0;
    transform:translateY(-20px);
    animation:fadeIn 2s forwards;
}

.subtitle{
    font-size:18px;
    color:#ccc;
    margin-bottom:20px;
    opacity:0;
    animation:fadeIn 2.5s forwards;
}

video{
    width:90%;
    max-width:700px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(255,215,0,0.3);
    opacity:0;
    animation:fadeIn 3s forwards;
}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="name" id="guestName"></div>

    <div class="subtitle">شما به مراسم ما دعوت هستید</div>

    <video autoplay controls>
        <source src="Kart_davat.mp4" type="video/mp4">
    </video>

</div>

<script>
// گرفتن اسم از لینک
const params = new URLSearchParams(window.location.search);
let name = params.get("name");

// اگر اسم نبود
if(!name){
    name = "مهمان عزیز";
}

// نمایش متن
document.getElementById("guestName").innerText =
"خدمت خانواده " + name;
</script>

</body>
</html>
