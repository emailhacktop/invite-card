<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوتنامه عروسی</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:tahoma;
    color:white;
    text-align:center;
}

/* افکت ورود کل صفحه */
.scene{
    opacity:0;
    transform:scale(1.1);
    animation:sceneIn 2s forwards;
}

@keyframes sceneIn{
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* اسم طلایی */
.name{
    font-size:42px;
    font-weight:bold;
    margin-top:60px;
    color:gold;
    text-shadow:0 0 15px gold, 0 0 30px orange;
    opacity:0;
    transform:translateY(-20px);
    animation:fadeName 2s 1s forwards;
}

@keyframes fadeName{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* زیرنویس */
.sub{
    margin-top:10px;
    color:#ccc;
    font-size:18px;
    opacity:0;
    animation:fadeSub 2s 2s forwards;
}

@keyframes fadeSub{
    to{opacity:1;}
}

/* ویدیو */
video{
    width:95%;
    max-width:700px;
    margin-top:30px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(255,215,0,0.2);
    opacity:0;
    animation:fadeVideo 2s 3s forwards;
}

@keyframes fadeVideo{
    to{opacity:1;}
}

/* overlay شروع سینمایی */
.overlay{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:black;
    z-index:10;
    animation:fadeOutOverlay 3s forwards;
}

@keyframes fadeOutOverlay{
    0%{opacity:1;}
    100%{opacity:0; visibility:hidden;}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="scene">

    <div class="name" id="guestName"></div>

    <div class="sub">به مراسم باشکوه ما خوش آمدید</div>

    <video id="video" controls>
        <source src="Kart_davat.mp4" type="video/mp4">
    </video>

</div>

<script>
const params = new URLSearchParams(window.location.search);
let name = params.get("name") || "مهمان عزیز";

document.getElementById("guestName").innerText =
"خدمت خانواده " + name;

// شروع ویدیو با تأخیر سینمایی
window.onload = () => {
    setTimeout(() => {
        document.getElementById("video").play();
    }, 3500);
};
</script>

</body>
</html>
