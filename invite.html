<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوتنامه</title>

<style>
body{
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
    font-family:tahoma;
    text-align:center;
    color:white;
}

/* شروع سینمایی */
.overlay{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:black;
    z-index:10;
    animation:fadeOut 3s forwards;
}

@keyframes fadeOut{
    0%{opacity:1;}
    100%{opacity:0; visibility:hidden;}
}

/* کل صحنه */
.scene{
    opacity:0;
    transform:scale(1.1);
    animation:sceneIn 2s forwards;
}

@keyframes sceneIn{
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* متن اصلی */
.name{
    font-size:20px;
    margin-top:60px;
    font-weight:bold;

    color:silver;
    text-shadow:
        0 0 5px #fff,
        0 0 10px #c0c0c0,
        0 0 20px #999;

    min-height:40px;
}

/* زیر متن */
.sub{
    margin-top:10px;
    font-size:16px;
    color:#ccc;
    opacity:0;
    animation:fadeSub 2s 3s forwards;
}

@keyframes fadeSub{
    to{opacity:1;}
}

/* ویدیو */
video{
    width:95%;
    max-width:600px;
    margin-top:30px;
    border-radius:15px;
    box-shadow:0 0 30px rgba(255,255,255,0.15);
    opacity:0;
    animation:fadeVideo 2s 5s forwards;
}

@keyframes fadeVideo{
    to{opacity:1;}
}

/* جلوگیری از بزرگ شدن صفحه */
body, html{
    overflow-x:hidden;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="scene">

    <div class="name" id="guestName"></div>

    <div class="sub">به مراسم باشکوه ما خوش آمدید</div>

    <video id="video" controls>
        <source src="Kart_davat.mp4" type="video/mp4">
    </video>

</div>

<script>
const params = new URLSearchParams(window.location.search);
let name = params.get("name") || "مهمان عزیز";

let targetText = "خانواده محترم " + name;
let i = 0;

function typeWriter(){
    if(i < targetText.length){
        document.getElementById("guestName").innerHTML += targetText.charAt(i);
        i++;
        setTimeout(typeWriter, 80);
    }
}

window.onload = () => {
    setTimeout(() => {
        typeWriter();
    }, 1200);

    // شروع ویدیو بعد از تایپ
    setTimeout(() => {
        document.getElementById("video").play();
    }, 5000);
};
</script>

</body>
</html>
