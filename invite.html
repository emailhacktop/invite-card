<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>دعوتنامه اختصاصی</title>
<meta name="robots" content="noindex,nofollow">

<style>
@font-face{font-family:'Vazirmatn';src:url('Vazirmatn-Regular.woff2');}
@font-face{font-family:'IranNastaliq';src:url('IranNastaliq.ttf');}

*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:'Vazirmatn',Tahoma,sans-serif;
background:radial-gradient(circle at top,#3b2a00,#000 60%);
color:#fff;min-height:100vh;overflow-x:hidden;text-align:center;padding:20px;
}
.wrapper{
max-width:900px;margin:auto;padding-top:50px;
}
.name{
font-family:'IranNastaliq';
font-size:58px;
color:#FFD700;
margin:40px 0 10px;
text-shadow:0 0 20px rgba(255,215,0,.7);
}
.sub{
line-height:2.1;
font-size:19px;
padding:10px 20px;
}
video{
width:100%;
max-width:760px;
border-radius:20px;
margin-top:30px;
box-shadow:0 0 30px rgba(255,215,0,.25);
}
.frame{
position:fixed;
inset:10px;
border:3px solid #D4AF37;
border-radius:24px;
pointer-events:none;
}
#error{
display:none;
background:#450000;
padding:16px;
border-radius:12px;
max-width:500px;
margin:80px auto;
}
.signature{
position:fixed;
bottom:10px;
left:15px;
opacity:.3;
font-size:12px;
}
</style>
</head>

<body>
<div class="frame"></div>

<div id="error">
لینک دعوتنامه معتبر نیست.
</div>

<div class="wrapper" id="app" style="display:none">
<div class="name" id="guestName"></div>

<div class="sub">
با نهایت احترام حضور گرم شما را در این مراسم ارج می‌نهیم و مشتاق دیدار شما هستیم.
</div>

<video controls controlsList="nodownload">
<source src="Kart_davat.mp4" type="video/mp4">
</video>
</div>

<div class="signature">Secure Invite Panel v2</div>

<script src="guests.js"></script>
<script>
const params = new URLSearchParams(location.search);
const id = params.get("id");
const token = params.get("token");

const guest = guests[id];

if(
guest &&
guest.token === token
){
document.getElementById("app").style.display="block";
document.getElementById("guestName").textContent = guest.name;
}else{
document.getElementById("error").style.display="block";
}

// جلوگیری ساده از راست کلیک
document.addEventListener("contextmenu",e=>e.preventDefault());
</script>
</body>
</html>
