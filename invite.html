<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="same-origin">
  <title>VIP Invitation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!--
  ====================================================
  صفحه افتتاحیه (Splash Screen)
  این صفحه قبل از نمایش دعوتنامه اجرا می‌شود.
  ====================================================
  -->

  <div id="intro" class="intro">

      <!-- قاب افتتاحیه -->
      <div class="intro-frame">

          <!-- اگر خواستی فیلم افتتاحیه بگذاری -->
          <!-- فایل را داخل پوشه assets با نام intro.mp4 قرار بده -->
          <video
              id="introVideo"
              class="intro-video"
              autoplay
              muted
              playsinline
              preload="auto">

              <source src="assets/intro.mp4" type="video/mp4">

          </video>

          <!-- اگر فیلم وجود نداشت این تصویر نمایش داده می‌شود -->
          <img
              id="introImage"
              class="intro-image"
              src="assets/intro.jpg"
              alt="">

          <!-- لایه متن -->

          <div class="intro-overlay">

              <div class="intro-title">

                  به نام ایزد مهرآفرین

              </div>

              <div class="intro-sub">

                  دعوتنامه اختصاصی

              </div>

          </div>

      </div>

  </div>

  <div id="particles" class="particles"></div>
  <div class="frame"></div>

  <main>
    <div id="guestName" class="guest-name"></div>

    <div class="welcome-text">
      با نهایت احترام حضور گرم شما را در این مراسم ارج می‌نهیم و مشتاق دیدار شما هستیم.
    </div>

    <video
      controls
      controlsList="nodownload noplaybackrate"
      disablePictureInPicture
      playsinline
      preload="metadata">
      <source src="Kart_davat.mp4" type="video/mp4">
    </video>
  </main>

  <div id="expiredBox" class="expired-box">
    <div class="expired-title">لینک منقضی شده است</div>
  </div>

  <!-- لوگوی مخفی مدیریت برای ریست شمارنده بازدید -->
  <div id="adminLogo" class="admin-logo">AminSystem2000</div>

  <script src="guests.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
