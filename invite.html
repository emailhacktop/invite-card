<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوتنامه VIP</title>

<style>

body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:tahoma;
    text-align:center;
    color:white;

    background:
    radial-gradient(circle at top,
    #2b1b10,
    #000000,
    #3a2a1a);
}

/* ذرات نور */
.particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
}

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:gold;
    border-radius:50%;
    animation:move 10s linear infinite;
    opacity:0.6;
}

@keyframes move{

    from{
        transform:
        translateY(100vh)
        scale(0.5);

        opacity:0;
    }

    to{
        transform:
        translateY(-10vh)
        scale(1.2);

        opacity:1;
    }
}

/* متن هولوگرام */
.name{

    font-size:22px;

    margin-top:60px;

    font-weight:bold;

    color:#e8f6ff;

    text-shadow:
        0 0 5px #8be9fd,
        0 0 10px #8be9fd,
        0 0 20px #00e5ff,
        0 0 40px rgba(0,229,255,0.6);

    animation:
    hologram 2s infinite alternate;

    min-height:40px;
}

@keyframes hologram{

    from{
        text-shadow:
            0 0 5px #8be9fd,
            0 0 10px #00e5ff,
            0 0 20px #00e5ff;
    }

    to{
        text-shadow:
            0 0 10px #fff,
            0 0 20px #00e5ff,
            0 0 40px #00e5ff,
            0 0 60px rgba(0,229,255,0.8);
    }
}

/* زیر متن */
.sub{

    margin-top:10px;

    font-size:16px;

    color:#ddd;

    opacity:0;

    animation:
    fadeSub 2s 3s forwards;
}

@keyframes fadeSub{

    to{
        opacity:1;
    }
}

/* ویدیو */
video{

    width:95%;

    max-width:600px;

    margin-top:30px;

    border-radius:15px;

    box-shadow:
        0 0 20px rgba(255,215,0,0.1),
        0 0 40px rgba(255,215,0,0.15);

    opacity:0;

    animation:
    fadeVideo 2s 5s forwards;
}

@keyframes fadeVideo{

    to{
        opacity:1;
    }
}

/* برند */
.signature{

    position:fixed;

    bottom:10px;

    right:15px;

    font-size:11px;

    color:
    rgba(255,255,255,0.25);

    letter-spacing:1px;

    z-index:999;

    user-select:none;
}

body,html{
    overflow-x:hidden;
}

</style>
</head>

<body>

<!-- ذرات -->
<div class="particles" id="particles"></div>

<!-- متن -->
<div class="name" id="guestName"></div>

<div class="sub">
با حضورتان دراین محفل شادی، ما را مفتخر نمائید.
</div>

<!-- ویدیو -->
<video id="video" controls>
    <source src="Kart_davat.mp4" type="video/mp4">
</video>

<!-- برند -->
<div class="signature" id="adminLogo">
AminSystem2000
</div>

<script>

/* شمارنده بازدید */

let views =
localStorage.getItem("views")
|| 0;

/* محدودیت */

if(views >= 10){

    document.body.innerHTML = `

    <div style="
    color:white;
    font-size:24px;
    margin-top:100px;
    text-align:center;
    ">

    لینک منقضی شده است

    </div>

    `;

}else{

    localStorage.setItem(
    "views",
    Number(views)+1
    );
}

/* گرفتن اسم */

const params =
new URLSearchParams(
window.location.search
);

let name =
params.get("name")
|| "مهمان عزیز";

/* تایپ سینمایی */

let text =
"خدمت خانواده محترم "
+ name;

let i = 0;

function typeWriter(){

    if(i < text.length){

        document
        .getElementById(
        "guestName"
        )
        .innerHTML +=
        text.charAt(i);

        i++;

        setTimeout(
        typeWriter,
        70
        );
    }
}

/* ذرات */

function createParticles(){

    const container =
    document.getElementById(
    "particles"
    );

    for(let i=0;i<40;i++){

        let span =
        document.createElement(
        "span"
        );

        span.style.left =
        Math.random()*100
        + "vw";

        span.style.animationDuration =
        (5 + Math.random()*5)
        + "s";

        span.style.opacity =
        Math.random();

        container.appendChild(
        span
        );
    }
}

/* پنل مخفی مدیر */

let tapCount = 0;

document
.getElementById("adminLogo")
.addEventListener("click", () => {

    tapCount++;

    if(tapCount >= 7){

        let pass =
        prompt("رمز مدیریت");

        if(pass === "Amin2000"){

            localStorage.removeItem(
            "views"
            );

            alert(
            "شمارنده ریست شد"
            );

        }else{

            alert(
            "رمز اشتباه است"
            );
        }

        tapCount = 0;
    }
});

/* شروع */

window.onload = () => {

    createParticles();

    setTimeout(() => {

        typeWriter();

    },1000);

    setTimeout(() => {

        document
        .getElementById(
        "video"
        )
        .play();

    },5000);
};

</script>

</body>
</html>
