<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوتنامه VIP</title>

<style>
body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:tahoma,sans-serif;
    text-align:center;
    color:white;
    background:radial-gradient(circle at top,#2b1b10,#000000,#3a2a1a);
}

/* ذرات نور */
.particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
}

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:gold;
    border-radius:50%;
    animation:move 10s linear infinite;
    opacity:.6;
}

@keyframes move{
    from{transform:translateY(100vh) scale(.5);opacity:0;}
    to{transform:translateY(-10vh) scale(1.2);opacity:1;}
}

/* متن هولوگرام */
.name{
    font-size:22px;
    margin-top:60px;
    font-weight:bold;
    color:#e8f6ff;
    min-height:40px;
    text-shadow:0 0 5px #8be9fd,0 0 10px #8be9fd,0 0 20px #00e5ff;
    animation:hologram 2s infinite alternate;
}

@keyframes hologram{
    from{ text-shadow:0 0 5px #8be9fd,0 0 10px #00e5ff,0 0 20px #00e5ff; }
    to{ text-shadow:0 0 10px #fff,0 0 20px #00e5ff,0 0 40px #00e5ff; }
}

.sub{
    margin-top:10px;
    font-size:16px;
    color:#ddd;
    opacity:0;
    animation:fadeSub 2s 3s forwards;
}

@keyframes fadeSub{to{opacity:1;}}

/* ویدیو */
video{
    width:95%;
    max-width:600px;
    margin-top:30px;
    border-radius:15px;
    opacity:0;
    animation:fadeVideo 2s 5s forwards;
}

@keyframes fadeVideo{to{opacity:1;}}

/* برند */
.signature{
    position:fixed;
    bottom:10px;
    right:15px;
    font-size:11px;
    color:rgba(255,255,255,0.25);
    letter-spacing:1px;
    z-index:9999;
    user-select:none;
    cursor:pointer;
}

body,html{overflow-x:hidden;}
</style>
</head>
<body>

<!-- ذرات -->
<div class="particles" id="particles"></div>

<!-- متن -->
<div class="name" id="guestName"></div>

<div class="sub">
با حضورتان در این محفل شادی، ما را مفتخر نمائید.
</div>

<!-- ویدیو -->
<video id="video" controls>
    <source src="Kart_davat.mp4" type="video/mp4">
</video>

<!-- برند -->
<div class="signature" id="adminLogo">AminSystem2000</div>

<script src="guests.js"></script>
<script>
const ADMIN_HASH = "QW1pbjIwMDA=";

const params = new URLSearchParams(window.location.search);
const guestId = params.get("id") || "unknown";

const name = (typeof guests !== "undefined" && guests[guestId])
    ? guests[guestId]
    : "مهمان ویژه";

const viewKey = "views_" + guestId;

let views = parseInt(localStorage.getItem(viewKey) || "0");
let expired = false;

if(views >= 10){
    expired = true;

    document.body.insertAdjacentHTML("beforeend",`
        <div id="expiredMessage" style="
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.92);
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        color:white;
        text-align:center;
        z-index:500;">
            <div style="font-size:24px;">لینک منقضی شده است</div>
            <div style="margin-top:15px;font-size:13px;color:#aaa;">
                جهت مدیریت روی لوگوی پایین صفحه کلیک کنید
            </div>
        </div>
    `);
}else{
    localStorage.setItem(viewKey, views + 1);
}

let text = "خدمت خانواده محترم " + name;
let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("guestName").textContent += text.charAt(i);
        i++;
        setTimeout(typeWriter,70);
    }
}

function createParticles(){
    const container = document.getElementById("particles");
    container.innerHTML = "";

    for(let i=0;i<40;i++){
        const span = document.createElement("span");
        span.style.left = Math.random()*100 + "vw";
        span.style.animationDuration = (5 + Math.random()*5) + "s";
        span.style.opacity = Math.random();
        container.appendChild(span);
    }
}

const video = document.getElementById("video");

video.addEventListener("error",()=>{
    video.insertAdjacentHTML("afterend",
    '<div style="color:#ffcc66;margin-top:15px">فایل ویدیو یافت نشد</div>');
});

let tapCount = 0;

document.getElementById("adminLogo").addEventListener("click",()=>{
    tapCount++;

    if(tapCount >= 7){

        const pass = prompt("رمز مدیریت");

        if(btoa(pass || "") === ADMIN_HASH){

            localStorage.removeItem(viewKey);

            alert("شمارنده این مهمان ریست شد");

            location.reload();

        }else{
            alert("رمز اشتباه است");
        }

        tapCount = 0;
    }
});

window.onload = ()=>{

    createParticles();

    if(!expired){
        setTimeout(typeWriter,1000);

        setTimeout(()=>{
            video.play().catch(()=>{});
        },5000);
    }
};
</script>

</body>
</html>
