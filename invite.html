<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوتنامه VIP</title>

<style>
body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:tahoma;
    text-align:center;
    color:white;

    /* بک‌گراند VIP */
    background: radial-gradient(circle at top, #2b1b10, #000000, #3a2a1a);
}

/* ذرات طلایی */
.particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
}

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:gold;
    border-radius:50%;
    animation:move 10s linear infinite;
    opacity:0.6;
}

@keyframes move{
    from{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }
    to{
        transform:translateY(-10vh) scale(1.2);
        opacity:1;
    }
}

/* اسم VIP */
.name{
    font-size:22px;
    margin-top:60px;
    font-weight:bold;
    color:#f5e6c8;

    text-shadow:
        0 0 10px #d4af37,
        0 0 20px #b8860b,
        0 0 30px rgba(255,215,0,0.4);

    min-height:40px;
}

/* زیر متن */
.sub{
    margin-top:10px;
    font-size:16px;
    color:#ddd;
    opacity:0;
    animation:fadeSub 2s 3s forwards;
}

@keyframes fadeSub{
    to{opacity:1;}
}

/* ویدیو */
video{
    width:95%;
    max-width:600px;
    margin-top:30px;
    border-radius:15px;
    box-shadow:0 0 40px rgba(255,215,0,0.2);
    opacity:0;
    animation:fadeVideo 2s 5s forwards;
}

@keyframes fadeVideo{
    to{opacity:1;}
}

/* جلوگیری از اسکرول */
body,html{
    overflow-x:hidden;
}
</style>
</head>

<body>

<!-- ذرات -->
<div class="particles" id="particles"></div>

<div class="name" id="guestName"></div>
<div class="sub">به مراسم باشکوه ما خوش آمدید</div>

<video id="video" controls>
    <source src="Kart_davat.mp4" type="video/mp4">
</video>

<script>
const params = new URLSearchParams(window.location.search);
let name = params.get("name") || "مهمان عزیز";

// تایپ سینمایی
let text = "خانواده محترم " + name;
let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("guestName").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 70);
    }
}

// ساخت ذرات طلایی
function createParticles(){
    const container = document.getElementById("particles");

    for(let i=0;i<40;i++){
        let span = document.createElement("span");
        span.style.left = Math.random()*100 + "vw";
        span.style.animationDuration = (5 + Math.random()*5) + "s";
        span.style.opacity = Math.random();
        container.appendChild(span);
    }
}

window.onload = () => {
    createParticles();

    setTimeout(() => {
        typeWriter();
    }, 1000);

    setTimeout(() => {
        document.getElementById("video").play();
    }, 5000);
};
</script>

</body>
</html>
