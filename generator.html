<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>تولید لینک مهمانان</title>

<style>

body{

font-family:tahoma;

background:#111;

color:white;

padding:20px;

}

h1{

text-align:center;

color:gold;

}

.card{

border:1px solid #333;

padding:15px;

margin:10px 0;

border-radius:10px;

background:#1a1a1a;

}

.name{

font-size:18px;

margin-bottom:10px;

color:#FFD700;

}

.link{

word-break:break-all;

font-size:13px;

color:#ddd;

margin-bottom:10px;

}

button{

padding:8px 15px;

cursor:pointer;

border:none;

border-radius:5px;

background:gold;

font-weight:bold;

}

.topButtons{

margin-bottom:20px;

display:flex;

gap:10px;

flex-wrap:wrap;

}

</style>

</head>

<body>

<h1>

تولید لینک مهمانان

</h1>

<div class="topButtons">

<button onclick="exportCSV()">

دانلود CSV

</button>

<button onclick="copyAll()">

کپی همه لینک ها

</button>

</div>

<div id="list"></div>

<script src="guests.js"></script>

<script>

const BASE_URL =
"https://emailhacktop.github.io/invite-card/invite.html";

const container =
document.getElementById(
"list"
);

let allLinks = "";

for(
const id in guests
){

const guest =
guests[id];

const link =
BASE_URL +
"?id=" +
id +
"&token=" +
guest.token;

allLinks +=
guest.name +
"\n" +
link +
"\n\n";

const div =
document.createElement(
"div"
);

div.className =
"card";

div.innerHTML = `

<div class="name">

${guest.name}

</div>

<div class="link">

${link}

</div>

<button
onclick="copyLink('${link}')">

کپی لینک

</button>

`;

container.appendChild(
div
);

}

function copyLink(link){

navigator.clipboard
.writeText(link);

alert(
"لینک کپی شد"
);

}

function copyAll(){

navigator.clipboard
.writeText(
allLinks
);

alert(
"همه لینک ها کپی شد"
);

}

function exportCSV(){

let csv =
"ID,NAME,TOKEN\n";

for(
const id in guests
){

csv +=

id + "," +

guests[id].name + "," +

guests[id].token +

"\n";

}

const blob =
new Blob(

[csv],

{
type:
"text/csv;charset=utf-8;"
}

);

const url =
URL.createObjectURL(
blob
);

const a =
document.createElement(
"a"
);

a.href = url;

a.download =
"guests.csv";

document.body
.appendChild(a);

a.click();

a.remove();

URL.revokeObjectURL(
url
);

}

</script>

</body>

</html>
