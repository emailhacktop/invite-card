<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدیریت مهمان‌ها</title>

<style>
body{
font-family:tahoma;
background:#111;
color:white;
padding:20px;
}

.card{
border:1px solid #333;
padding:15px;
margin:10px 0;
border-radius:10px;
background:#1a1a1a;
}

button{
padding:8px 15px;
cursor:pointer;
border:none;
border-radius:5px;
background:gold;
font-weight:bold;
}
</style>
</head>

<body>

<h2>مدیریت لینک مهمان‌ها</h2>

<div id="list"></div>

<script src="guests.js"></script>

<script>
"use strict";

const BASE_URL =
"https://emailhacktop.github.io/invite-card/invite.html";

function safeCSV(value){

value = String(value);

if(
value.startsWith("=") ||
value.startsWith("+") ||
value.startsWith("-") ||
value.startsWith("@")
){
return "'" + value;
}

return value;
}

const container =
document.getElementById("list");

for(const id in guests){

const guest = guests[id];

const link =
BASE_URL +
"?id=" + encodeURIComponent(id) +
"&token=" + encodeURIComponent(guest.token);

const card =
document.createElement("div");

card.className = "card";

const title =
document.createElement("div");

title.textContent = guest.name;

const linkBox =
document.createElement("div");

linkBox.textContent = link;

const btn =
document.createElement("button");

btn.textContent = "کپی لینک";

btn.onclick = ()=>{

navigator.clipboard.writeText(link);

alert("کپی شد");
};

card.appendChild(title);
card.appendChild(linkBox);
card.appendChild(btn);

container.appendChild(card);
}

function exportCSV(){

let csv = "ID,NAME,TOKEN\n";

for(const id in guests){

csv +=
safeCSV(id) + "," +
safeCSV(guests[id].name) + "," +
safeCSV(guests[id].token) + "\n";
}

const blob =
new Blob(
[csv],
{type:"text/csv;charset=utf-8;"}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download = "guests.csv";

a.click();

URL.revokeObjectURL(url);
}
</script>

</body>
</html>
